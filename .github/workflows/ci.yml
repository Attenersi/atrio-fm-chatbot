name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy (incremental coverage)
        run: uv run mypy app/db app/classifier.py app/config.py app/question_bank.py

      - name: Pytest
        run: uv run pytest tests -q

      - name: pip-audit
        run: uv run pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm run typecheck

      - run: npm audit --audit-level=critical

  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [backend, frontend]
    if: |
      (secrets.LLM_API_KEY != '' || secrets.NVIDIA_API_KEY != '') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      LLM_EMBED_API_KEY: ${{ secrets.LLM_EMBED_API_KEY }}
      NVIDIA_EMBED_API_KEY: ${{ secrets.NVIDIA_EMBED_API_KEY }}
      CI_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Write backend/.env for Compose
        working-directory: backend
        run: |
          set -e
          CHAT_KEY="${LLM_API_KEY:-$NVIDIA_API_KEY}"
          EMBED_RAW="${LLM_EMBED_API_KEY:-$NVIDIA_EMBED_API_KEY}"
          EMBED="${EMBED_RAW:-$CHAT_KEY}"
          ADMIN_PW="${CI_ADMIN_PASSWORD:-ci-admin-password}"
          cat > .env <<EOF
          LLM_API_KEY=${CHAT_KEY}
          LLM_EMBED_API_KEY=${EMBED}
          LLM_BASE_URL=https://integrate.api.nvidia.com/v1
          LLM_MODEL=meta/llama-3.1-70b-instruct
          EMBED_MODEL=nvidia/llama-nemotron-embed-1b-v2
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=${ADMIN_PW}
          ADMIN_TOKEN=ci-local-token
          AUTH_BOOTSTRAP_USER_PASSWORD=
          EOF

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          docker compose logs backend
          exit 1

      - name: Ingest FM docs
        run: docker compose exec -T backend python -m app.ingest

      - name: RAG smoke eval
        env:
          MIN_RATE: ${{ vars.EVAL_MIN_API_OK_PASS_RATE }}
        run: |
          RATE="${MIN_RATE:-70}"
          docker compose exec -T backend python /app/test_rag.py \
            --base-url http://127.0.0.1:8000 \
            --username admin \
            --password "${CI_ADMIN_PASSWORD:-ci-admin-password}" \
            --cases-file tests/suites/ci_eval_smoke.json \
            --output /tmp/ci_eval_smoke_results.json \
            --sleep-between 5 \
            --timeout 180 \
            --min-api-ok-count 1 \
            --min-api-ok-pass-rate "$RATE"

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs --tail=200 backend

# Alembic config for fm-chatbot. The actual SQLite path is resolved at runtime
# from `app.config.SQLITE_DB_PATH`, so the URL here is only a placeholder.
# Run from inside ``backend/`` so module imports resolve correctly.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///placeholder.db
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

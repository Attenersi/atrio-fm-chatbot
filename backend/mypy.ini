[mypy]
python_version = 3.11
warn_unused_configs = True
ignore_missing_imports = True
namespace_packages = True
explicit_package_bases = True
mypy_path = .
exclude = (^alembic/|^venv/|^\.venv/)

# CI runs incremental checks first (expand over time):
#   mypy app/db app/classifier.py app/config.py app/question_bank.py
[mypy-app.database]
follow_imports = skip
